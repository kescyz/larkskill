name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build skills zip
        run: |
          zip -r larkskill-skills-latest.zip \
            skills/ \
            agents/ \
            scripts/ \
            plugin.yaml \
            README.md \
            LICENSE

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: larkskill-skills-latest.zip
          generate_release_notes: true
